name: '🗑️ Destroy Infrastructure (CloudFormation Delete)'

on:
  # Harus dijalankan MANUAL — tidak boleh otomatis!
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Ketik DESTROY untuk konfirmasi penghapusan semua resource'
        required: true
        type: string
      environment:
        description: 'Environment yang akan dihapus'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  AWS_REGION: ap-southeast-1

jobs:
  # ─────────────────────────────────────────────
  # SAFETY CHECK — Pastikan user benar-benar yakin
  # ─────────────────────────────────────────────
  safety-check:
    name: 🔒 Safety Check
    runs-on: ubuntu-latest
    steps:
      - name: Validate Confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "❌ DIBATALKAN: Konfirmasi salah!"
            echo "   Anda memasukkan: '${{ github.event.inputs.confirm }}'"
            echo "   Harus mengetik: DESTROY"
            exit 1
          fi
          echo "✅ Konfirmasi diterima — melanjutkan penghapusan..."
          echo "⚠️  Environment: ${{ github.event.inputs.environment }}"

      - name: Print Warning
        run: |
          echo "================================================"
          echo "   ⚠️  PERINGATAN: SEMUA RESOURCE AKAN DIHAPUS"
          echo "================================================"
          echo "Stack yang akan dihapus (urutan terbalik):"
          echo "  6. myapp-apigateway"
          echo "  5. myapp-lambda"
          echo "  4. myapp-beanstalk"
          echo "  3. myapp-storage"
          echo "  2. myapp-rds    ← RDS akan di-snapshot dulu"
          echo "  1. myapp-vpc"
          echo ""
          echo "⏱️  Proses ini membutuhkan ~10-20 menit"
          echo "================================================"

  # ─────────────────────────────────────────────
  # DESTROY — Hapus stack dari atas ke bawah
  # Urutan kebalikan dari deploy!
  # ─────────────────────────────────────────────
  destroy:
    name: 🗑️ Delete All Stacks
    runs-on: ubuntu-latest
    needs: safety-check
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check Stack Status Before Delete
        run: |
          echo "=== Status Stack Sebelum Dihapus ==="
          for stack in myapp-apigateway myapp-lambda myapp-beanstalk myapp-storage myapp-rds myapp-vpc; do
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name $stack \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null || echo "NOT_FOUND")
            echo "$stack → $STATUS"
          done

      # ── Step 1: Hapus API Gateway ─────────────────────────────────
      - name: Delete Stack 6 - API Gateway
        run: |
          STACK="myapp-apigateway"
          STATUS=$(aws cloudformation describe-stacks --stack-name $STACK --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$STATUS" = "NOT_FOUND" ]; then
            echo "⏭️  $STACK tidak ditemukan, dilewati"
          else
            echo "🗑️  Menghapus $STACK..."
            aws cloudformation delete-stack --stack-name $STACK --region ${{ env.AWS_REGION }}
            aws cloudformation wait stack-delete-complete --stack-name $STACK --region ${{ env.AWS_REGION }}
            echo "✅ $STACK berhasil dihapus"
          fi

      # ── Step 2: Hapus Lambda ──────────────────────────────────────
      - name: Delete Stack 5 - Lambda
        run: |
          STACK="myapp-lambda"
          STATUS=$(aws cloudformation describe-stacks --stack-name $STACK --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$STATUS" = "NOT_FOUND" ]; then
            echo "⏭️  $STACK tidak ditemukan, dilewati"
          else
            echo "🗑️  Menghapus $STACK..."
            aws cloudformation delete-stack --stack-name $STACK --region ${{ env.AWS_REGION }}
            aws cloudformation wait stack-delete-complete --stack-name $STACK --region ${{ env.AWS_REGION }}
            echo "✅ $STACK berhasil dihapus"
          fi

      # ── Step 3: Hapus Elastic Beanstalk ──────────────────────────
      - name: Delete Stack 4 - Elastic Beanstalk
        run: |
          STACK="myapp-beanstalk"
          STATUS=$(aws cloudformation describe-stacks --stack-name $STACK --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$STATUS" = "NOT_FOUND" ]; then
            echo "⏭️  $STACK tidak ditemukan, dilewati"
          else
            echo "🗑️  Menghapus $STACK (termasuk EC2, ALB, ASG)..."
            aws cloudformation delete-stack --stack-name $STACK --region ${{ env.AWS_REGION }}
            # Beanstalk butuh waktu lebih lama
            aws cloudformation wait stack-delete-complete --stack-name $STACK --region ${{ env.AWS_REGION }}
            echo "✅ $STACK berhasil dihapus"
          fi

      # ── Step 4: Hapus Storage (S3 + EFS) ─────────────────────────
      - name: Delete Stack 3 - Storage (S3 + EFS)
        run: |
          STACK="myapp-storage"
          STATUS=$(aws cloudformation describe-stacks --stack-name $STACK --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$STATUS" = "NOT_FOUND" ]; then
            echo "⏭️  $STACK tidak ditemukan, dilewati"
          else
            # ⚠️ S3 harus dikosongkan dulu sebelum stack bisa dihapus
            echo "🧹 Mengosongkan S3 bucket dulu..."
            BUCKET="myapp-storage-${{ secrets.AWS_ACCOUNT_ID }}-${{ env.AWS_REGION }}"
            
            # Hapus semua versi object (karena versioning aktif)
            aws s3api list-object-versions \
              --bucket $BUCKET \
              --query '{Objects: Versions[].{Key:Key,VersionId:VersionId}}' \
              --output json 2>/dev/null | \
            jq -r '.Objects // [] | .[] | "--delete-object Key=" + .Key + ",VersionId=" + .VersionId' | \
            xargs -r aws s3api delete-objects --bucket $BUCKET --delete "$(cat -)" 2>/dev/null || true
            
            # Hapus semua objects biasa
            aws s3 rm s3://$BUCKET --recursive 2>/dev/null || true
            
            echo "🗑️  Menghapus $STACK..."
            aws cloudformation delete-stack --stack-name $STACK --region ${{ env.AWS_REGION }}
            aws cloudformation wait stack-delete-complete --stack-name $STACK --region ${{ env.AWS_REGION }}
            echo "✅ $STACK berhasil dihapus"
          fi

      # ── Step 5: Hapus RDS ─────────────────────────────────────────
      - name: Delete Stack 2 - RDS PostgreSQL
        run: |
          STACK="myapp-rds"
          STATUS=$(aws cloudformation describe-stacks --stack-name $STACK --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$STATUS" = "NOT_FOUND" ]; then
            echo "⏭️  $STACK tidak ditemukan, dilewati"
          else
            # ⚠️ Disable DeletionProtection dulu sebelum hapus RDS
            echo "🔓 Menonaktifkan RDS Deletion Protection..."
            aws rds modify-db-instance \
              --db-instance-identifier myapp-postgres \
              --no-deletion-protection \
              --apply-immediately \
              --region ${{ env.AWS_REGION }} 2>/dev/null || true
            
            # Tunggu modifikasi selesai
            sleep 30
            
            echo "🗑️  Menghapus $STACK (RDS akan di-snapshot dulu)..."
            aws cloudformation delete-stack --stack-name $STACK --region ${{ env.AWS_REGION }}
            
            # RDS butuh waktu paling lama (~10 menit)
            echo "⏳ Menunggu RDS dihapus (bisa 10-15 menit)..."
            aws cloudformation wait stack-delete-complete \
              --stack-name $STACK \
              --region ${{ env.AWS_REGION }}
            echo "✅ $STACK berhasil dihapus"
          fi

      # ── Step 6: Hapus VPC (terakhir) ──────────────────────────────
      - name: Delete Stack 1 - VPC
        run: |
          STACK="myapp-vpc"
          STATUS=$(aws cloudformation describe-stacks --stack-name $STACK --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          
          if [ "$STATUS" = "NOT_FOUND" ]; then
            echo "⏭️  $STACK tidak ditemukan, dilewati"
          else
            echo "🗑️  Menghapus $STACK (NAT Gateway, Subnets, IGW)..."
            aws cloudformation delete-stack --stack-name $STACK --region ${{ env.AWS_REGION }}
            aws cloudformation wait stack-delete-complete --stack-name $STACK --region ${{ env.AWS_REGION }}
            echo "✅ $STACK berhasil dihapus"
          fi

      # ── Step 7: Hapus Artifact Bucket ─────────────────────────────
      - name: Delete Artifact S3 Bucket
        run: |
          BUCKET="myapp-artifacts-${{ secrets.AWS_ACCOUNT_ID }}"
          
          if aws s3 ls "s3://${BUCKET}" 2>/dev/null; then
            echo "🧹 Mengosongkan dan menghapus artifact bucket..."
            aws s3 rm s3://${BUCKET} --recursive 2>/dev/null || true
            aws s3api delete-bucket --bucket ${BUCKET} --region ${{ env.AWS_REGION }} 2>/dev/null || true
            echo "✅ Artifact bucket dihapus"
          else
            echo "⏭️  Artifact bucket tidak ditemukan"
          fi

      # ── Final Report ───────────────────────────────────────────────
      - name: Final Status Report
        run: |
          echo "================================================"
          echo "          ✅ DESTROY SELESAI                   "
          echo "================================================"
          echo "Verifikasi status semua stack:"
          for stack in myapp-apigateway myapp-lambda myapp-beanstalk myapp-storage myapp-rds myapp-vpc; do
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name $stack \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null || echo "✅ DELETED")
            echo "$stack → $STATUS"
          done
          echo ""
          echo "💡 Catatan: RDS final snapshot masih tersimpan di AWS"
          echo "   Hapus manual di Console: RDS → Snapshots jika sudah tidak diperlukan"
          echo "================================================"
