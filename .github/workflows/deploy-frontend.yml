name: '🌐 Deploy Frontend (AWS Amplify)'

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Test Frontend
  # ─────────────────────────────────────────────
  build-test:
    name: Build & Test React App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run Tests
        working-directory: ./frontend
        run: npm test -- --run
        continue-on-error: true          # Jangan gagal jika belum ada test

      - name: Build Production Bundle
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm run build
          echo "Build complete!"
          ls -la dist/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: Trigger Amplify Deploy
  # ─────────────────────────────────────────────
  deploy-amplify:
    name: Trigger Amplify Deployment
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger Amplify Build
        run: |
          echo "Triggering Amplify build for app: ${{ secrets.AMPLIFY_APP_ID }}"
          
          JOB_ID=$(aws amplify start-job \
            --app-id ${{ secrets.AMPLIFY_APP_ID }} \
            --branch-name main \
            --job-type RELEASE \
            --query 'jobSummary.jobId' \
            --output text)
          
          echo "Amplify Job ID: $JOB_ID"
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Wait for Amplify Build
        run: |
          echo "Waiting for Amplify build to complete..."
          MAX_WAIT=600    # 10 menit maksimal
          ELAPSED=0
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(aws amplify get-job \
              --app-id ${{ secrets.AMPLIFY_APP_ID }} \
              --branch-name main \
              --job-id $JOB_ID \
              --query 'job.summary.status' \
              --output text)
            
            echo "Status: $STATUS (elapsed: ${ELAPSED}s)"
            
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "✅ Amplify build succeeded!"
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "❌ Amplify build failed with status: $STATUS"
              exit 1
            fi
            
            sleep 30
            ELAPSED=$((ELAPSED + 30))
          done

      - name: Print Frontend URL
        run: |
          AMPLIFY_URL=$(aws amplify get-app \
            --app-id ${{ secrets.AMPLIFY_APP_ID }} \
            --query 'app.defaultDomain' \
            --output text)
          echo "======================================"
          echo "Frontend URL: https://main.${AMPLIFY_URL}"
          echo "======================================"
