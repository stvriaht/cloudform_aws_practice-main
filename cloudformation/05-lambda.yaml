AWSTemplateFormatVersion: '2010-09-09'
Description: 'STACK 5 - Lambda Functions Python 3.12: POST handler dan GET handler'

Parameters:
  DBPassword:
    Type: String
    NoEcho: true

Resources:

  # ─────────────────────────────────────────────
  # LAMBDA FUNCTION — POST Handler
  # ─────────────────────────────────────────────
  LambdaPostFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: myapp-post-handler
      Description: 'Insert data ke RDS PostgreSQL via POST request'
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: arn:aws:iam::581967380620:role/LabRole
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Sub 'myapp-artifacts-${AWS::AccountId}'
        S3Key: lambda/post-handler.zip
      Environment:
        Variables:
          DB_HOST: !ImportValue myapp-DBEndpoint
          DB_PORT: '5432'
          DB_NAME: myappdb
          DB_USER: myappuser
          DB_PASSWORD: !Ref DBPassword
      VpcConfig:
        SubnetIds:
          - !ImportValue myapp-PrivateSubnet1Id
        SecurityGroupIds:
          - !ImportValue myapp-LambdaSGId
      Tags:
        - Key: Name
          Value: myapp-post-handler

  # ─────────────────────────────────────────────
  # LAMBDA FUNCTION — GET Handler
  # ─────────────────────────────────────────────
  LambdaGetFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: myapp-get-handler
      Description: 'Ambil data & statistik dari RDS PostgreSQL via GET request'
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: arn:aws:iam::581967380620:role/LabRole
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Sub 'myapp-artifacts-${AWS::AccountId}'
        S3Key: lambda/get-handler.zip
      Environment:
        Variables:
          DB_HOST: !ImportValue myapp-DBEndpoint
          DB_PORT: '5432'
          DB_NAME: myappdb
          DB_USER: myappuser
          DB_PASSWORD: !Ref DBPassword
      VpcConfig:
        SubnetIds:
          - !ImportValue myapp-PrivateSubnet1Id
        SecurityGroupIds:
          - !ImportValue myapp-LambdaSGId
      Tags:
        - Key: Name
          Value: myapp-get-handler

  # ─────────────────────────────────────────────
  # CLOUDWATCH LOG GROUPS
  # ─────────────────────────────────────────────
  PostLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/myapp-post-handler
      RetentionInDays: 14

  GetLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/myapp-get-handler
      RetentionInDays: 14

Outputs:
  PostLambdaArn:
    Description: ARN Lambda POST Handler
    Value: !GetAtt LambdaPostFunction.Arn
    Export:
      Name: myapp-PostLambdaArn

  GetLambdaArn:
    Description: ARN Lambda GET Handler
    Value: !GetAtt LambdaGetFunction.Arn
    Export:
      Name: myapp-GetLambdaArn

  PostLambdaName:
    Description: Nama Lambda POST
    Value: !Ref LambdaPostFunction
    Export:
      Name: myapp-PostLambdaName

  GetLambdaName:
    Description: Nama Lambda GET
    Value: !Ref LambdaGetFunction
    Export:
      Name: myapp-GetLambdaName
