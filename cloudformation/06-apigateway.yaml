AWSTemplateFormatVersion: '2010-09-09'
Description: 'STACK 6 - API Gateway REST API: routing POST dan GET ke Lambda'

Resources:

  # ─────────────────────────────────────────────
  # REST API
  # ─────────────────────────────────────────────
  RestAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: myapp-api
      Description: 'REST API untuk myapp — POST dan GET data'
      EndpointConfiguration:
        Types:
          - REGIONAL                       # Regional endpoint, lebih murah dari Edge
      Tags:
        - Key: Name
          Value: myapp-rest-api

  # ─────────────────────────────────────────────
  # RESOURCE /data
  # ─────────────────────────────────────────────
  DataResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestAPI
      ParentId: !GetAtt RestAPI.RootResourceId
      PathPart: data

  # ─────────────────────────────────────────────
  # POST /data → Lambda POST Handler
  # ─────────────────────────────────────────────
  PostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestAPI
      ResourceId: !Ref DataResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations'
          - LambdaArn: !ImportValue myapp-PostLambdaArn
      MethodResponses:
        - StatusCode: '200'
        - StatusCode: '201'
        - StatusCode: '400'
        - StatusCode: '500'

  # ─────────────────────────────────────────────
  # GET /data → Lambda GET Handler
  # ─────────────────────────────────────────────
  GetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestAPI
      ResourceId: !Ref DataResource
      HttpMethod: GET
      AuthorizationType: NONE
      RequestParameters:
        method.request.querystring.category: false
        method.request.querystring.limit: false
        method.request.querystring.offset: false
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations'
          - LambdaArn: !ImportValue myapp-GetLambdaArn
      MethodResponses:
        - StatusCode: '200'
        - StatusCode: '500'

  # ─────────────────────────────────────────────
  # OPTIONS /data → CORS preflight
  # ─────────────────────────────────────────────
  OptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestAPI
      ResourceId: !Ref DataResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # ─────────────────────────────────────────────
  # DEPLOYMENT & STAGE
  # ─────────────────────────────────────────────
  APIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PostMethod
      - GetMethod
      - OptionsMethod
    Properties:
      RestApiId: !Ref RestAPI
      Description: 'Production deployment'

  APIStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestAPI
      DeploymentId: !Ref APIDeployment
      StageName: v1
      Description: 'Production stage v1'
      # Throttling untuk proteksi high traffic
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          ThrottlingBurstLimit: 200        # Max burst 200 request sekaligus
          ThrottlingRateLimit: 100         # Max 100 request/detik steady state
          # Tuntaskan free tier API Gateway (hapus LoggingLevel agar tidak perlu set IAM Role akun global untuk CloudWatch Logs)

  # ─────────────────────────────────────────────
  # Lambda Permissions — izinkan API Gateway invoke Lambda
  # ─────────────────────────────────────────────
  PostLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !ImportValue myapp-PostLambdaArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestAPI}/*/POST/data'

  GetLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !ImportValue myapp-GetLambdaArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestAPI}/*/GET/data'

  # ─────────────────────────────────────────────
  # Gateway Responses (Untuk CORS pada error 4xx/5xx)
  # ─────────────────────────────────────────────
  GatewayResponse4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
      ResponseType: DEFAULT_4XX
      RestApiId: !Ref RestAPI

  GatewayResponse5XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
      ResponseType: DEFAULT_5XX
      RestApiId: !Ref RestAPI

# ─────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────
Outputs:
  APIEndpoint:
    Description: URL API Gateway — gunakan sebagai VITE_API_URL di frontend
    Value: !Sub 'https://${RestAPI}.execute-api.${AWS::Region}.amazonaws.com/v1'
    Export:
      Name: myapp-APIEndpoint

  RestAPIId:
    Description: REST API ID
    Value: !Ref RestAPI
    Export:
      Name: myapp-RestAPIId
