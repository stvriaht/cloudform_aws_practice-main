AWSTemplateFormatVersion: '2010-09-09'
Description: 'STACK 4 - Elastic Beanstalk Node.js (Learner Lab Compatible)'

Parameters:
  DBPassword:
    Type: String
    NoEcho: true

Resources:

  # ─────────────────────────────────────────────
  # ELASTIC BEANSTALK APPLICATION
  # ─────────────────────────────────────────────
  BeanstalkApp:
    Type: AWS::ElasticBeanstalk::Application
    Properties:
      ApplicationName: myapp-backend
      Description: 'Node.js Express Backend'

  # ─────────────────────────────────────────────
  # ELASTIC BEANSTALK ENVIRONMENT - SINGLE INSTANCE (lebih simple)
  # ─────────────────────────────────────────────
  BeanstalkEnvironment:
    Type: AWS::ElasticBeanstalk::Environment
    DependsOn:
      - BeanstalkApp
    Properties:
      ApplicationName: !Ref BeanstalkApp
      EnvironmentName: myapp-backend-env
      SolutionStackName: '64bit Amazon Linux 2 v5.11.2 running Node.js 18'
      Tier:
        Name: WebServer
        Type: Standard
      OptionSettings:

        # ── Instance Configuration ─────────────────
        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: InstanceType
          Value: t3.micro

        # Gunakan instance profile default dari Learner Lab
        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: IamInstanceProfile
          Value: LabInstanceProfile

        # HAPUS EC2KeyName - tidak wajib untuk Learner Lab
        # - Namespace: aws:autoscaling:launchconfiguration
        #   OptionName: EC2KeyName
        #   Value: vockey

        # ── VPC Configuration ──────────────────────
        - Namespace: aws:ec2:vpc
          OptionName: VPCId
          Value: !ImportValue myapp-VpcId

        # Gunakan PUBLIC subnets (biar lebih mudah)
        - Namespace: aws:ec2:vpc
          OptionName: Subnets
          Value: !Join
            - ','
            - - !ImportValue myapp-PublicSubnet1Id
              - !ImportValue myapp-PublicSubnet2Id

        - Namespace: aws:ec2:vpc
          OptionName: ELBSubnets
          Value: !Join
            - ','
            - - !ImportValue myapp-PublicSubnet1Id
              - !ImportValue myapp-PublicSubnet2Id

        - Namespace: aws:ec2:vpc
          OptionName: ELBScheme
          Value: public

        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: SecurityGroups
          Value: !ImportValue myapp-BeanstalkSGId

        # ── Auto Scaling (Single Instance) ─────────
        - Namespace: aws:autoscaling:asg
          OptionName: MinSize
          Value: '1'

        - Namespace: aws:autoscaling:asg
          OptionName: MaxSize
          Value: '1'

        # ── Load Balancer (Single Instance tidak perlu ALB)
        - Namespace: aws:elasticbeanstalk:environment
          OptionName: EnvironmentType
          Value: SingleInstance

        # ── Health Check ───────────────────────────
        - Namespace: aws:elasticbeanstalk:environment
          OptionName: ServiceRole
          Value: LabRole

        - Namespace: aws:elasticbeanstalk:healthreporting:system
          OptionName: SystemType
          Value: basic

        - Namespace: aws:elasticbeanstalk:application
          OptionName: Application Healthcheck URL
          Value: /health

        # ── Environment Variables ──────────────────
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: NODE_ENV
          Value: production

        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: PORT
          Value: '8080'

        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: DB_HOST
          Value: !ImportValue myapp-DBEndpoint

        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: DB_PORT
          Value: '5432'

        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: DB_NAME
          Value: myappdb

        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: DB_USER
          Value: myappuser

        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: DB_PASSWORD
          Value: !Ref DBPassword

        # ── Logging ─────────────────────────────────
        - Namespace: aws:elasticbeanstalk:cloudwatch:logs
          OptionName: StreamLogs
          OptionValue: 'false'

        # ── Root Volume Size ────────────────────────
        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: RootVolumeSize
          Value: '10'

Outputs:
  BeanstalkURL:
    Description: URL Elastic Beanstalk Environment
    Value: !GetAtt BeanstalkEnvironment.EndpointURL
    Export:
      Name: myapp-BeanstalkURL

  BeanstalkAppName:
    Description: Nama Aplikasi Beanstalk
    Value: !Ref BeanstalkApp
    Export:
      Name: myapp-BeanstalkAppName

  BeanstalkEnvName:
    Description: Nama Environment Beanstalk
    Value: !Ref BeanstalkEnvironment
    Export:
      Name: myapp-BeanstalkEnvName
